name: vitalstack

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devdbpassword}
      POSTGRES_DB: ${POSTGRES_DB:-vitalstack_dev}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - vs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: "vs-api"
    build:
      context: ..
      dockerfile: Backend.API/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SECRETS_PATH=/app/secrets
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - vs_network

volumes:
  postgres_data:

networks:
  vs_network:
    driver: bridge
