name: vitalstack

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vitalstack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend.api:
    container_name: "vs-api"
    build:
      context: ..
      dockerfile: Backend.API/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SECRETS_PATH=/app/secrets
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - vs_network

volumes:
  postgres_data:

networks:
  vs_network:
    driver: bridge
